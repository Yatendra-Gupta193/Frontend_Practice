<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>Dynamic Calendar</title>
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="script.js" defer></script>
  </head>

  <body>
    <div class="app-shell">
      <div class="wrapper">
        <header>
          <div class="topbar">
            <div class="clock" id="clock">🕒 --:-- --</div>

            <div class="header-row">
              <div class="badge" id="current-date">Sunday, 7 June 2026</div>

              <div class="controls">
                <button class="btn btn-icon" id="prev" type="button" aria-label="Previous month">
                  ◀
                </button>
                <button class="btn btn-icon" id="next" type="button" aria-label="Next month">
                  ▶
                </button>

                <div class="control-group">
                  <select class="year-select" id="year" aria-label="Select year"></select>
                </div>

                <button class="btn" id="todayBtn" type="button">📅 Today</button>
              </div>
            </div>

            <div class="control-group" style="margin-top: 12px;">
              <span class="badge">Theme</span>
              <div class="theme-group" aria-label="Theme toggle">
                <button class="theme-dot" data-theme="purple" type="button" title="Purple"></button>
                <button class="theme-dot" data-theme="blue" type="button" title="Blue"></button>
                <button class="theme-dot" data-theme="green" type="button" title="Green"></button>
                <button class="theme-dot" data-theme="dark" type="button" title="Dark"></button>
              </div>
            </div>
          </div>
        </header>

        <div class="calendar">
          <ul class="weeks">
            <li>Sun</li>
            <li>Mon</li>
            <li>Tue</li>
            <li>Wed</li>
            <li>Thu</li>
            <li>Fri</li>
            <li>Sat</li>
          </ul>
          <ul class="days" id="days"></ul>
        </div>
      </div>

      <aside class="agenda">
        <div class="agenda-card">
          <h3>Upcoming Events</h3>
          <div class="agenda-list" id="agendaList">No events yet.</div>
          <div class="agenda-hint">Tip: Click a date to add an event.</div>
        </div>
      </aside>

      <div class="modal-overlay" id="modalOverlay" hidden></div>
      <div class="modal" id="eventModal" hidden role="dialog" aria-modal="true">
        <div class="modal-header">
          <div>
            <div class="modal-title" id="modalTitle">Add Event</div>
            <div class="modal-subtitle" id="modalSubtitle">7 June 2026</div>
          </div>
          <button class="btn btn-icon" id="modalClose" type="button" aria-label="Close">✕</button>
        </div>

        <form class="modal-body" id="eventForm">
          <input type="hidden" id="modalDateKey" />

          <div class="field">
            <label for="eventText">Event</label>
            <input id="eventText" required placeholder="e.g., Birthday Party" />
          </div>

          <div class="field">
            <label for="eventType">Type</label>
            <select id="eventType">
              <option value="event">Event</option>
              <option value="task">Task</option>
            </select>
          </div>

          <div class="field">
            <label for="eventNote">Note</label>
            <textarea id="eventNote" rows="3" placeholder="Optional note"></textarea>
          </div>

          <div class="modal-actions">
            <button class="btn" type="submit">Save</button>
            <button class="btn" type="button" id="deleteBtn" title="Delete selected event">Delete</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
