<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text to Speech Converter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-gradient" aria-hidden="true"></div>

    <div class="container" id="app">
      <header class="header">
        <div class="title">🎙️ Text To Speech Pro</div>
        <div class="subtitle">Convert any text into natural speech</div>

        <div class="theme-toggle">
          <button type="button" id="themeBtn" class="icon-btn" aria-label="Toggle theme">
            <span id="themeIcon">🌙</span>
          </button>
        </div>
      </header>

      <main class="content">
        <section class="card-section">
          <textarea
            id="textInput"
            placeholder="Type something to hear it spoken aloud..."
            maxlength="5000"
          ></textarea>

          <div class="meta-row">
            <div class="meta">
              <span id="charCount">0</span> / 5000 characters
            </div>
            <div class="meta">
              <span id="wordCount">0</span> words
            </div>
          </div>
        </section>

        <section class="controls">
          <div class="control">
            <label for="voiceSelect">Voice</label>
            <select id="voiceSelect" aria-label="Voice selection">
              <option value="default">Default</option>
              <option value="en">English</option>
            </select>
          </div>

          <div class="control">
            <label for="rateRange">Speech Rate</label>
            <div class="range-row">
              <input id="rateRange" type="range" min="0.5" max="2" step="0.1" value="1" />
              <div class="range-value" id="rateValue">1x</div>
            </div>
          </div>

          <div class="control">
            <label for="pitchRange">Pitch</label>
            <div class="range-row">
              <input id="pitchRange" type="range" min="0" max="2" step="0.1" value="1" />
              <div class="range-value" id="pitchValue">1</div>
            </div>
          </div>

          <div class="control">
            <label for="volumeRange">Volume</label>
            <div class="range-row">
              <input id="volumeRange" type="range" min="0" max="1" step="0.1" value="1" />
              <div class="range-value" id="volumeValue">🔈 100%</div>
            </div>
          </div>
        </section>

        <section class="actions">
          <div class="primary-actions">
            <button type="button" id="speakBtn" class="btn btn-green">▶ Speak</button>
            <button type="button" id="pauseBtn" class="btn btn-orange" disabled>⏸ Pause</button>
            <button type="button" id="resumeBtn" class="btn btn-blue" disabled>▶ Resume</button>
            <button type="button" id="stopBtn" class="btn btn-red" disabled>⏹ Stop</button>
          </div>

          <div class="secondary-actions">
            <button type="button" id="copyBtn" class="icon-btn secondary">📋 Copy</button>
            <button type="button" id="clearBtn" class="icon-btn secondary">🗑 Clear</button>
          </div>
        </section>

        <section class="status" aria-live="polite">
          <div class="speaking-indicator" id="speakingIndicator">
            <div class="waves" aria-hidden="true">
              <span></span><span></span><span></span><span></span>
            </div>
            <div class="speaking-text" id="speakingText">Idle</div>
          </div>
        </section>
      </main>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
